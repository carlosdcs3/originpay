[deploy]
preDeployCommand = "rm -f bootstrap/cache/config.php bootstrap/cache/packages.php bootstrap/cache/services.php && php artisan optimize:clear && php artisan about && php artisan tinker --execute=\"dump(['translation_driver' => config('translation.driver'), 'env_translation_driver' => env('TRANSLATION_DRIVER'), 'config_cached' => app()->configurationIsCached(), 'environment' => app()->environment()]);\" && php artisan migrate:status --no-ansi && php artisan migrate --force && php artisan config:cache && php artisan route:cache && php artisan view:cache"
startCommand = "php artisan serve --host=0.0.0.0 --port=${PORT}"
